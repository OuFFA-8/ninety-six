@if (project) {
  <div class="branding-page">

    <header class="branding-header">
      <a routerLink="/portfolio" class="branding-back">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Portfolio
      </a>
      <div class="branding-info">
        <span class="branding-tag">{{ project.tag }}</span>
        <h1 class="branding-title"><span class="branding-lw"><span class="branding-ln">{{ project.title }}</span></span></h1>
        <div class="branding-count">{{ images.length }} pieces</div>
      </div>
    </header>

    <main class="branding-stack">
      @for (src of images; track src; let i = $index) {
        <img
          [src]="src"
          [alt]="project.title + ' · ' + (i + 1)"
          [loading]="i < 2 ? 'eager' : 'lazy'"
          class="branding-img"
        />
      }
    </main>

  </div>
}
