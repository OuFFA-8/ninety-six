<canvas #starsCanvas class="social-stars"></canvas>

@if (project) {
  <div class="social-page">

    <header class="social-header">
      <a routerLink="/portfolio" class="social-back">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Portfolio
      </a>
      <div class="social-info">
        <span class="social-tag">{{ project.tag }}</span>
        <h1 class="social-title">
          <span class="social-lw"><span class="social-ln">{{ project.title }}</span></span>
        </h1>
        <p class="social-desc">{{ project.desc }}</p>
        <div class="social-count">{{ images.length }} pieces</div>
      </div>
    </header>

    <main class="social-gallery">
      @for (src of images; track src; let i = $index) {
        <div class="social-item" (click)="open(src)">
          <img [src]="src" [loading]="i < 4 ? 'eager' : 'lazy'" />
          <div class="social-item__overlay">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      }
    </main>

  </div>
}

@if (lightbox()) {
  <div class="social-lightbox" (click)="close()">
    <button class="social-lightbox__close" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <img [src]="lightbox()!" (click)="$event.stopPropagation()" />

  </div>
}
