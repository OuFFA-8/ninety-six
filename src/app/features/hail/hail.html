<canvas #starsCanvas class="hail-stars"></canvas>
<div class="hail-page">
  <!-- Header -->
  <header class="hail-header">
    <a routerLink="/portfolio" class="hail-back">
      <svg viewBox="0 0 20 20" fill="none">
        <path
          d="M12 4L6 10L12 16"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
      Portfolio
    </a>
    <div class="hail-info">
      <span class="hail-tag">Social Media · Motion · 2024</span>
      <h1 class="hail-title">
        <span class="hail-lw"
          ><span class="hail-ln">Rally <em>Hail .</em></span></span
        >
      </h1>
      <p class="hail-desc">
        Social media designs, event coverage, and digital content for Rally Hail — celebrations,
        competitions, and brand moments.
      </p>
      <div class="hail-count">{{ images.length }} pieces</div>
    </div>
  </header>

  <!-- Masonry Gallery -->
  <main class="hail-gallery">
    @for (src of images; track src) {
      <div class="hail-item" (click)="open(src)">
        <img [src]="src" [loading]="$index < 4 ? 'eager' : 'lazy'" />
        <div class="hail-item__overlay">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </div>
      </div>
    }
  </main>
</div>

<!-- Lightbox -->
@if (lightbox()) {
  <div class="hail-lightbox" (click)="close()">
    <button class="hail-lightbox__close" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M18 6L6 18M6 6l12 12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <img [src]="lightbox()!" (click)="$event.stopPropagation()" />
  </div>
}
