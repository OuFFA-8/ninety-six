<nav #navbar class="navbar" [class.is-hidden]="isHidden">
  <div class="navbar__inner">
    <a routerLink="/" class="navbar__logo">
      <img src="/Logo.png" alt="Ninety Six" />
    </a>

    <div class="navbar__right">
      <button
        class="navbar__trigger"
        [class.is-open]="isMenuOpen"
        (click)="toggleMenu()"
        aria-label="Toggle menu"
      >
        <span class="navbar__trigger-label">{{ isMenuOpen ? 'CLOSE' : 'MENU' }}</span>
        <div class="navbar__trigger-icon">
          <span></span>
          <span></span>
        </div>
      </button>

      <div #dropdown class="navbar__dropdown" [class.is-open]="isMenuOpen">
        <ul class="navbar__nav">
          <li>
            <a
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="close()"
            >
              <span class="nav-num">01</span><span class="nav-label">Home</span>
            </a>
          </li>
          <li>
            <a routerLink="/portfolio" routerLinkActive="active" (click)="close()">
              <span class="nav-num">02</span><span class="nav-label">Portfolio</span>
            </a>
          </li>
          <li>
            <a routerLink="/about" routerLinkActive="active" (click)="close()">
              <span class="nav-num">03</span><span class="nav-label">About</span>
            </a>
          </li>
          <li>
            <a routerLink="/contact" routerLinkActive="active" (click)="close()">
              <span class="nav-num">04</span><span class="nav-label">Contact</span>
            </a>
          </li>
        </ul>

        <!-- TODO: replace 966500000000 with the real WhatsApp number -->
        <a href="https://wa.me/966500000000" target="_blank" rel="noopener" class="navbar__cta-link" (click)="close()">
          Start a project <span class="cta-arrow">→</span>
        </a>
      </div>
    </div>
  </div>
</nav>
