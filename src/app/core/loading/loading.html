<div #overlay class="ld-overlay">

  <!-- Dartboard -->
  <div #board class="ld-board">
    <!-- Sectors: outermost → innermost -->
    <div #sector class="ld-sector ld-sector--5"></div>
    <div #sector class="ld-sector ld-sector--4"></div>
    <div #sector class="ld-sector ld-sector--3"></div>
    <div #sector class="ld-sector ld-sector--2"></div>
    <div #sector class="ld-sector ld-sector--1"></div>

    <!-- Targeting reticle lines -->
    <div class="ld-cross ld-cross--h"></div>
    <div class="ld-cross ld-cross--v"></div>
    <div class="ld-cross ld-cross--d1"></div>
    <div class="ld-cross ld-cross--d2"></div>

    <!-- Bullseye -->
    <div #bullseye class="ld-bullseye"></div>

    <!-- Dart -->
    <div #dart class="ld-dart">
      <div class="ld-dart__flight-h"></div>
      <div class="ld-dart__flight-v"></div>
      <div class="ld-dart__barrel"></div>
      <div class="ld-dart__tip"></div>
    </div>
  </div>

  <!-- Brand text -->
  <div #labels class="ld-labels">
    <p #name class="ld-name">Ninety Six</p>
    <p #studio class="ld-studio">Studio</p>
  </div>

</div>
