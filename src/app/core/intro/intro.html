<div class="intro">
  <canvas #canvas class="intro__canvas"></canvas>

  <!-- Crosshair -->
  <div class="crosshair">
    <div class="crosshair__line crosshair__line--h"></div>
    <div class="crosshair__line crosshair__line--v"></div>
    <div class="crosshair__dot"></div>
  </div>

  <!-- Instruction -->
  <div #instruction class="intro__instruction">
    <div class="intro__instruction-inner">
      <span class="intro__key">HOLD</span>
      <p>Hold & Release to fire</p>
      <div class="intro__arrow-hint">↓</div>
    </div>
  </div>

  <!-- Hit Feedback -->
  <div #hitFeedback class="intro__hit">
    <div class="intro__hit-ring"></div>
    <span>BULLSEYE!</span>
    <p>Entering the target...</p>
  </div>

  <!-- Brand -->
  <div class="intro__brand">
    <span>NINETY SIX</span>
    <span class="intro__brand-sub">MARKETING</span>
  </div>
</div>
