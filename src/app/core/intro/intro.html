<div #introRoot class="pitch">
  <canvas #canvas class="pitch__canvas"></canvas>

  <!-- Top brand bar -->
  <div class="pitch__brand">
    <span class="pitch__brand-name">NINETY SIX</span>
    <span class="pitch__brand-sub">SELECTED WORKS · 2025</span>
  </div>

  <!-- Center HUD — populated when a panel is hovered -->
  <div class="pitch__hud">
    <div class="pitch__hud-line">
      <div #hudCategory class="pitch__hud-category"></div>
      <div #hudClient class="pitch__hud-client"></div>
    </div>
  </div>

  <!-- Bottom hint -->
  <div #hudHint class="pitch__hint">
    <div class="pitch__hint-inner">
      <span class="pitch__hint-icon">+</span>
      <span class="pitch__hint-text">Move to explore · Click to enter</span>
      <span class="pitch__hint-icon">+</span>
    </div>
  </div>

  <!-- Tiny progress strip top-right -->
  <div #progress class="pitch__progress">
    <span>SIX WORKS</span>
    <div class="pitch__progress-bar"><div class="pitch__progress-bar-fill"></div></div>
  </div>
</div>
